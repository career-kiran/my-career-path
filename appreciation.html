<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Thank you | My Career Path</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #fafafa;
  color: #333;
}

/* Center everything */
.page {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

/* Content box */
.content {
  max-width: 700px;
  padding: 40px;
}

/* Header */
.site-title {
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 40px;
}

/* Main text */
.main-text {
  font-size: 20px;
  margin-bottom: 18px;
}

/* Supporting text */
.sub-text {
  font-size: 16px;
  color: #666;
  margin-bottom: 30px;
  line-height: 2.2;
}

/* Button */
button {
  padding: 12px 28px;
  font-size: 15px;
  border: none;
  border-radius: 6px;
  background: #222;
  color: #fff;
  cursor: pointer;
}

button:hover {
  background: #000;
}
</style>
</head>

<body>

<div class="page">
  <div class="content">

    <div class="site-title">My Career Path</div>

    <div class="main-text">
      Thank you for being honest with yourself.
    </div>

    <div class="sub-text">
      What you shared will help us suggest directions, not decisions.<br>
      You don't have to choose anything right now.<br>
      Everyone figures things out at their own pace.<br>
      Let's take the next step together.
    </div>

    <button onclick="location.href='path-selection.html'">

    </button>

  </div>
