



<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Careers After 10th</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="header"></div>


<script src="layout.js"></script>


<script src="search.js"></script>


<div class="main">

<button onclick="goBack()" class="back-button">← Back</button>



<div class="career-header">

<h1>🛠️ Careers After Diploma</h1>



<div class="career-action">

<button onclick="savePage()">⭐ Save</button>
<button onclick="sharePage()">📤 Share</button>
</div>
</div>

<div id="career-list" class="role-grid"></div>

<script src="career-data.js"></script>










<script src="reflection.js"></script>



<button onclick="scrollToTop()" id="scrollTopBtn">↑ Top</button>


<script>
function scrollToTop(){
window.scrollTo({
top:0,
behavior:'smooth'
});
}
</script>


<div id="footer"></div>

<script src="navigation.js"></script>



<script src="career-actions.js"></script>



<script>
const container = document.getElementById("career-list");

const filteredCareers = window.careers.filter(career =>
    career.levels && career.levels.includes("Diploma")
);

filteredCareers.sort((a, b) => a.name.localeCompare(b.name));

filteredCareers.forEach(career => {
   const div = document.createElement("div");
div.classList.add("role-card");

div.innerHTML = `
  <h3>${career.name}</h3>
  <p>Click to explore this career</p>
`;

div.onclick = () => {
  window.location.href = career.page;
};

container.appendChild(div); 
});
</script>



</body>


</html>
