<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Question 2 | My Career Path</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #fafafa;
  color: #333;
}

/* Page wrapper fills screen */
.page {
  min-height: 100vh;
  padding: 40px;
}

/* Site name */
.site-title {
  font-size: 26px;
  font-weight: bold;
  margin-bottom: 60px;
}

/* Question section */
.question {
  max-width: 700px;
}

.question h1 {
  font-weight: normal;
  margin-bottom: 40px;
}

/* Options */
.option {
  margin: 18px 0;
  font-size: 16px;
}

.option label {
  cursor: pointer;
}

.option input {
  margin-right: 12px;
}

/* Helper text */
.helper {
  margin-top: 30px;
  color: #666;
  font-size: 14px;
}

/* Continue button */
.button-area {
  margin-top: 40px;
}

button {
  padding: 12px 26px;
  font-size: 16px;
  border: none;
  border-radius: 6px;
  background: #333;
  color: #fff;
  cursor: pointer;
}

button:hover {
  background: #555;
}
</style>
</head>

<body>

<div class="page">

  <div class="site-title">My Career Path</div>

  <div class="question">
    <h1>What do you enjoy doing more?</h1>

    <div class="option">
      <label>
        <input type="radio" name="q2">
        Helping people or listening to them
      </label>
    </div>

    <div class="option">
      <label>
        <input type="radio" name="q2">
        Solving problems or finding solutions
      </label>
    </div>

    <div class="option">
      <label>
        <input type="radio" name="q2">
        Creating ideas (like drawing, writing, apps, games)
      </label>
    </div>

    <div class="option">
      <label>
        <input type="radio" name="q2">
        Working with hands or tools(like fixing things,building something,cooking or handling tools and machines)
      </label>
    </div>

    <div class="option">
      <label>
        <input type="radio" name="q2">
        Learning, reading, or understanding how things work
      </label>
    </div>

    <div class="option">
      <label>
        <input type="radio" name="q2">
        Planning, organising, or managing things
      </label>
    </div>

    <div class="option">
      <label>
        <input type="radio" name="q2">
        I am not sure yet
      </label>
    </div>

    <div class="helper">
      Choose what feels closer to you. You can always change your mind later.
    </div>

    <div class="button-area">
      <button onclick="location.href='transition2.html'">Continue</button>
    </div>
  </div>

</div>

</body>
</html>
