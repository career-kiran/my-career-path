<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Question 4 | My Career Path</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #fafafa;
  color: #333;
}

/* ===== PAGE LAYOUT ===== */
.page {
  min-height: 100vh;
  padding: 40px;
}

/* ===== SITE TITLE ===== */
.site-title {
  font-size: 26px;
  font-weight: bold;
  margin-bottom: 60px;
}

/* ===== QUESTION ===== */
.question {
  font-size: 26px;
  font-weight: normal;
  margin-bottom: 40px;
  max-width: 900px;
}

/* ===== OPTIONS ===== */
.options {
  max-width: 700px;
}

.option {
  margin: 26px 0;
  font-size: 18px;
}

.option label {
  cursor: pointer;
}

.option input {
  margin-right: 12px;
}

/* ===== NOTE ===== */
.note {
  margin-top: 30px;
  color: #666;
  font-size: 14px;
}

/* ===== BUTTON ===== */
.button-area {
  margin-top: 45px;
}

button {
  padding: 12px 26px;
  font-size: 16px;
  border: none;
  border-radius: 6px;
  background: #333;
  color: #fff;
  cursor: pointer;
}

button:hover {
  background: #555;
}
</style>
</head>

<body>

<div class="page">

  <!-- Site name -->
  <div class="site-title">My Career Path</div>

  <!-- Question -->
  <div class="question">
    What matters more to you when you think about your future?
  </div>

  <!-- Options -->
  <div class="options">

    <div class="option">
      <label>
        <input type="radio" name="q4">
        Feeling useful and helping others
      </label>
    </div>

    <div class="option">
      <label>
        <input type="radio" name="q4">
        Learning deeply and understanding subjects well
      </label>
    </div>

    <div class="option">
      <label>
        <input type="radio" name="q4">
        Having freedom to choose how I live and work
      </label>
    </div>

    <div class="option">
      <label>
        <input type="radio" name="q4">
        Having stability and a secure life
      </label>
    </div>

    <div class="option">
      <label>
        <input type="radio" name="q4">
        Improving myself and learning new skills
      </label>
    </div>

    <div class="option">
      <label>
        <input type="radio" name="q4">
        I’m not sure yet
      </label>
    </div>

  </div>

  <div class="note">
    There is no perfect answer. Choose what feels important to you right now.
  </div>

  <div class="button-area">
    <button onclick="location.href='transition4.html'">Continue</button>
  </div>

</div>

</body>
</html>
