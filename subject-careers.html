<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Subject Careers</title>

<link rel="stylesheet" href="style.css">

</head>

<body data-subject="">

<div id="header"></div>

<div class="main">

<h1 id="subjectTitle"></h1>

<div id="career-list" class="role-grid"></div>

</div>

<script src="layout.js"></script>
<script src="career-data.js"></script>



<script>
const params = new URLSearchParams(window.location.search);
const subject = params.get("subject");

if (subject) {
  document.body.dataset.subject = subject;
}
</script>

<script>
if (subject) {
  const title = document.getElementById("subjectTitle");
  if (title) {
    title.textContent = "Careers related to " + subject;
  }
}
</script>

<script src="career-loader.js"></script>
</body>
</html>
